<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ShukWAY · לוח הצוות" />
    <title>ShukWAY · לוח הצוות</title>

    <!-- prototype styles (served verbatim from /public) -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- loading / error / refresh states (additive only) -->
    <style>
      .sw-state {
        min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px; text-align: center; color: var(--muted, #6B6B6B);
        font-family: 'Heebo', 'Arial Hebrew', sans-serif; padding: 24px;
      }
      .sw-state p { font-size: 16px; max-width: 360px; line-height: 1.6; }
      .sw-state-ic { font-size: 40px; }
      .sw-spinner {
        width: 44px; height: 44px; border-radius: 50%;
        border: 4px solid rgba(14,86,87,0.15); border-top-color: #E56E13;
        animation: sw-spin 0.8s linear infinite;
      }
      @keyframes sw-spin { to { transform: rotate(360deg); } }
      .sw-refresh-fab {
        position: fixed; bottom: 18px; left: 18px; z-index: 60;
        display: inline-flex; align-items: center; gap: 6px;
        background: #fff; color: #0E5657; border: 1px solid rgba(14,86,87,0.18);
        border-radius: 999px; padding: 9px 16px; font: 600 13.5px 'Heebo', sans-serif;
        box-shadow: 0 2px 10px rgba(14,86,87,0.12); cursor: pointer; transition: all .15s;
      }
      .sw-refresh-fab:hover { box-shadow: 0 6px 18px rgba(14,86,87,0.18); transform: translateY(-1px); }
    </style>
    <script type="module" crossorigin src="/assets/index-Qo9IVEca.js"></script>
  </head>
