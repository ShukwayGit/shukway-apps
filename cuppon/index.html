<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuppon Demo · ShukWAY</title>
<style>
@font-face{font-family:'Ploni';src:url('fonts/ploni-regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Ploni';src:url('fonts/ploni-medium-aaa.woff') format('woff');font-weight:500;font-display:swap}
@font-face{font-family:'Ploni';src:url('fonts/ploni-demibold-aaa.woff') format('woff');font-weight:600;font-display:swap}
@font-face{font-family:'Ploni';src:url('fonts/ploni-bold-aaa.woff') format('woff');font-weight:700;font-display:swap}
@font-face{font-family:'Ploni';src:url('fonts/ploni-ultrabold-aaa.woff') format('woff');font-weight:800;font-display:swap}
</style>
<style>
:root{
  --teal:#038A82;--teal-deep:#0E5657;--teal-soft:#E6F1F0;
  --orange:#E56E13;--orange-deep:#C75A08;--orange-soft:#FCEBD8;
  --cream:#FBF8F3;--paper:#FFFFFF;
  --ink:#15302D;--ink-2:#34433F;--muted:#6B7B77;--subtle:#9AA8A4;
  --line:rgba(14,86,87,0.12);--line-2:rgba(14,86,87,0.20);
  --green:#2E9E5B;--green-soft:#E4F4EA;
  --amber:#D97706;--amber-soft:#FBEFDD;
  --grey-card:#F4F5F4;
  --r:10px;--r-lg:18px;--r-xl:26px;
  --shadow-soft:0 2px 10px rgba(14,86,87,0.07);
  --font:'Ploni','Ploni_ML_v2_AAA',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* tabular-nums only on numeric atoms */
.amt-display .num,.savings-hero .big,.pay-line b,.sum-row .v,.grey-card .big,.grey-card .save,
.stat .n,.pride-hero .v,.redeem .amt,.pl-row .val,.pl-row .k,.term b,#timerPill{
  font-kerning:none;font-feature-settings:"kern" 0,"calt" 0,"liga" 0;font-variant-numeric:tabular-nums;
}

html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:#BEC9C4;margin:0;}

/* ─── phone scaler ──────────────────────────────────────────── */
#scaler{
  position:fixed;top:0;left:0;
  width:390px;height:844px;
  overflow:hidden;
  transform-origin:top left;
}
@media(min-width:431px){
  #scaler{border-radius:46px;box-shadow:0 28px 80px rgba(0,0,0,.28),0 4px 20px rgba(0,0,0,.12);}
}
@media(max-width:430px){
  body{background:var(--paper);}
  #scaler{width:100vw;height:100svh;}
}

/* ─── app container ─────────────────────────────────────────── */
#app{
  position:relative;
  width:100%;height:100%;
  font-family:var(--font);background:var(--paper);color:var(--ink);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

.ah{
  flex:0 0 auto;
  display:grid;grid-template-columns:56px 1fr 56px;align-items:center;
  padding:calc(env(safe-area-inset-top,12px) + 10px) 16px 14px;
  border-bottom:1px solid var(--line);
}
.ah-title{font-size:18px;font-weight:700;text-align:center;color:var(--ink)}
.ah-btn{width:40px;height:40px;border-radius:50%;border:none;background:#F1F3F2;display:grid;place-items:center;cursor:pointer;color:var(--ink-2);transition:.2s}
.ah-btn:active{background:#E7EBEA}
.ah-btn svg{width:20px;height:20px}

#timerPill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:13px;font-weight:700;padding:5px 11px;border-radius:999px;
  background:var(--orange-soft);color:var(--orange-deep);
  border:none;font-family:var(--font);
}
#timerPill.urgent{background:var(--amber-soft);color:var(--amber)}

.body{
  flex:1 1 auto;overflow-y:auto;
  padding:18px 18px 26px;
  display:flex;flex-direction:column;gap:16px;
  scrollbar-width:none;
}
.body::-webkit-scrollbar{display:none}
.body.center{justify-content:center;align-items:center}

.foot{
  flex:0 0 auto;
  padding:12px 18px calc(18px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--line);background:var(--paper);
}
.cta{
  width:100%;border:none;border-radius:var(--r);padding:17px;
  font-family:var(--font);font-size:17px;font-weight:700;color:#fff;
  background:var(--orange);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 6px 16px rgba(229,110,19,0.30);transition:.15s;
}
.cta:active{background:var(--orange-deep)}
.cta.teal{background:var(--teal);box-shadow:0 6px 16px rgba(3,138,130,0.28)}
.cta.teal:active{background:var(--teal-deep)}
.cta:disabled{background:#D8DCDB;color:#fff;box-shadow:none;cursor:not-allowed}
.cta svg{width:19px;height:19px}
.foot-note{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;color:var(--muted);margin-bottom:11px;text-align:center}
.foot-note svg{width:15px;height:15px;color:var(--teal);flex:0 0 auto}

.coupon{position:relative;border-radius:var(--r-xl);padding:16px;overflow:hidden;border:2px dashed var(--c-accent,#E56E13);background:var(--c-pastel,#FCEBD8)}
.coupon::after{content:"";position:absolute;inset:auto -30px -34px auto;width:120px;height:120px;border-radius:40px;background:rgba(255,255,255,.30);transform:rotate(18deg)}
.coupon-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative;z-index:2}
.coupon-id{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.coupon-biz{font-size:18px;font-weight:800;color:var(--ink)}
.cap{display:inline-block;background:#fff;border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2);box-shadow:var(--shadow-soft)}
.biz-thumb{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:28px;background:#fff;box-shadow:var(--shadow-soft);flex:0 0 auto}
.target-ico{width:46px;height:46px;border-radius:14px;background:var(--c-accent,#E56E13);display:grid;place-items:center;box-shadow:0 6px 14px rgba(0,0,0,.14);flex:0 0 auto}
.target-ico svg{width:26px;height:26px}
.coupon-headline{position:relative;z-index:2;margin-top:14px;background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow-soft)}
.coupon-headline .hl{display:flex;align-items:center;gap:9px;font-size:21px;font-weight:800;color:var(--c-accent,#E56E13)}
.coupon-headline .hl svg{width:21px;height:21px;flex:0 0 auto}
.coupon-headline .sub{margin-top:7px;font-size:14px;color:var(--muted);line-height:1.5}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-soft)}
.card-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:14px}
.term{display:flex;align-items:center;gap:12px;padding:9px 0;font-size:15px;color:var(--ink-2);flex-direction:row-reverse;text-align:right}
.term+.term{border-top:1px solid var(--line)}
.term .tk{width:30px;height:30px;border-radius:9px;background:var(--teal-soft);display:grid;place-items:center;flex:0 0 auto}
.term .tk svg{width:17px;height:17px;color:var(--teal)}
.kicker{font-size:13px;font-weight:700;color:var(--muted)}

.locked{display:flex;align-items:center;gap:11px;background:var(--orange-soft);border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;color:var(--orange-deep);flex-direction:row-reverse;text-align:right}
.locked svg{width:20px;height:20px;flex:0 0 auto}

.reveal-head{display:flex;align-items:center;gap:12px;flex-direction:row-reverse;text-align:right}
.reveal-head .rk{width:44px;height:44px;border-radius:50%;background:var(--teal-soft);display:grid;place-items:center;flex:0 0 auto}
.reveal-head .rk svg{width:23px;height:23px;color:var(--teal)}
.reveal-head h2{font-size:19px;font-weight:800;color:var(--ink)}
.reveal-head p{font-size:13.5px;color:var(--muted);margin-top:2px}
.quiet-note{font-size:14px;color:var(--muted);line-height:1.6;background:var(--grey-card);border-radius:14px;padding:15px 16px;text-align:right}

.amt-prompt{text-align:center;font-size:15px;color:var(--muted);line-height:1.5}
.amt-prompt b{color:var(--ink);font-weight:700}
.amt-display{text-align:center;padding:6px 0 2px}
.amt-display .num{font-size:60px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px;direction:ltr;display:inline-flex;align-items:baseline;gap:8px}
.amt-display .num .cur{font-size:30px;color:var(--subtle);font-weight:700}
.amt-min{text-align:center;font-size:13px;color:var(--amber);margin-top:8px;min-height:18px;font-weight:600}
.savings-hero{border:2px solid var(--green);background:var(--green-soft);border-radius:18px;padding:18px;text-align:center;width:100%;display:none}
.savings-hero.show{display:block}
.savings-hero .lbl{font-size:14px;color:var(--green);font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:7px}
.savings-hero .lbl svg{width:18px;height:18px}
.savings-hero .big{font-size:40px;font-weight:800;color:var(--green);line-height:1;direction:ltr;display:inline-flex;align-items:baseline;gap:7px}
.savings-hero .big .u{font-size:19px;font-weight:700}
.savings-hero.pop .big{animation:pop .42s cubic-bezier(.2,1.3,.5,1) both}
.pay-line{text-align:center;font-size:15px;color:var(--muted);margin-top:2px}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.key{border:1px solid var(--line);background:#fff;border-radius:14px;padding:15px 0;font-family:var(--font);font-size:24px;font-weight:700;color:var(--ink);cursor:pointer;transition:.12s}
.key:active{transform:scale(.94);background:var(--orange-soft)}
.key.del{color:var(--muted)}
.key.del svg{width:24px;height:24px}

.sum-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:15px;color:var(--ink-2)}
.sum-row+.sum-row{border-top:1px solid var(--line)}
.sum-row .v{font-weight:800;color:var(--ink);direction:ltr}
.sum-row.big .v{font-size:20px}
.sum-row.disc .v{color:var(--green)}

.scan-wrap{flex:1;display:flex;flex-direction:column}
.viewfinder{position:relative;border-radius:22px;overflow:hidden;background:radial-gradient(120% 90% at 50% 30%,#1b2b29 0%,#0c1413 100%);aspect-ratio:1/1;display:grid;place-items:center}
.vf-frame{position:relative;width:62%;aspect-ratio:1/1;border-radius:18px}
.vf-frame .corner{position:absolute;width:30px;height:30px;border:3px solid #fff}
.vf-frame .c1{top:0;right:0;border-bottom:none;border-left:none;border-radius:0 8px 0 0}
.vf-frame .c2{top:0;left:0;border-bottom:none;border-right:none;border-radius:8px 0 0 0}
.vf-frame .c3{bottom:0;right:0;border-top:none;border-left:none;border-radius:0 0 8px 0}
.vf-frame .c4{bottom:0;left:0;border-top:none;border-right:none;border-radius:0 0 0 8px}
.vf-qr{width:78%;height:78%;background:#fff;border-radius:10px;padding:9%;opacity:.92}
.vf-qr svg{width:100%;height:100%;display:block}
.scanline{position:absolute;left:6%;right:6%;height:2px;background:linear-gradient(90deg,transparent,#37e0a0,transparent);box-shadow:0 0 12px #37e0a0;animation:scan 2.1s ease-in-out infinite}
.vf-tag{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(12,20,19,.7);color:#cfe;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;display:flex;align-items:center;gap:6px}
.vf-tag .dot{width:7px;height:7px;border-radius:50%;background:#37e0a0;box-shadow:0 0 8px #37e0a0;animation:blink 1s infinite}
.payload{margin-top:16px;background:var(--grey-card);border-radius:14px;padding:14px 16px}
.payload h4{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.payload h4 svg{width:15px;height:15px;color:var(--teal)}
.pl-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink-2)}
.pl-row .k{color:var(--muted);font-size:11.5px;direction:ltr}
.pl-row .val{font-weight:700;direction:ltr}
.pl-row .val.g{color:var(--green)}

/* position:absolute — contained inside #app (phone frame) on desktop */
.transmit{position:absolute;inset:0;background:rgba(251,248,243,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:50;opacity:0;pointer-events:none;transition:.25s}
.transmit.show{opacity:1;pointer-events:auto}
.tx-ring{width:74px;height:74px;border-radius:50%;border:4px solid var(--teal-soft);border-top-color:var(--teal);animation:spin .9s linear infinite}
.transmit p{font-size:16px;font-weight:700;color:var(--teal-deep)}
.transmit small{font-size:13px;color:var(--muted)}

.success-mark{width:96px;height:96px;border-radius:50%;background:var(--green-soft);display:grid;place-items:center;margin:0 auto;animation:popIn .5s cubic-bezier(.2,1.3,.5,1) both}
.success-mark .ring{width:74px;height:74px;border-radius:50%;background:var(--green);display:grid;place-items:center}
.success-mark svg{width:40px;height:40px;color:#fff}
.success-title{text-align:center;font-size:27px;font-weight:800;color:var(--ink)}
.grey-card{background:var(--grey-card);border-radius:18px;padding:22px}
.grey-card .lbl{text-align:center;font-size:14px;color:var(--muted);margin-bottom:6px}
.grey-card .big{text-align:center;font-size:34px;font-weight:800;color:var(--ink);direction:ltr}
.grey-card .div{height:1px;background:var(--line);margin:16px 0}
.grey-card .save{text-align:center;font-size:18px;font-weight:800;color:var(--green);direction:ltr}

.m-head{display:flex;align-items:center;gap:12px;flex-direction:row-reverse;text-align:right}
.m-head .mk{width:46px;height:46px;border-radius:14px;background:var(--teal);display:grid;place-items:center;flex:0 0 auto}
.m-head .mk svg{width:24px;height:24px;color:#fff}
.m-head h2{font-size:18px;font-weight:800;color:var(--ink)}
.m-head p{font-size:13px;color:var(--muted);margin-top:2px}
.stat-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:var(--teal-soft);border-radius:14px;padding:13px 10px;text-align:center}
.stat .n{font-size:22px;font-weight:800;color:var(--teal-deep);direction:ltr}
.stat .t{font-size:11.5px;color:var(--teal);margin-top:3px}
.redeem{display:flex;align-items:center;gap:12px;padding:13px 0;flex-direction:row-reverse}
.redeem+.redeem{border-top:1px solid var(--line)}
.redeem .dev{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--teal-soft);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--teal)}
.redeem .info{flex:1;text-align:right}
.redeem .info .v{font-size:14.5px;font-weight:700;color:var(--ink)}
.redeem .info .m{font-size:12px;color:var(--muted);margin-top:1px}
.redeem .amt{text-align:left;direction:ltr}
.redeem .amt .a{font-size:15px;font-weight:800;color:var(--ink)}
.redeem .amt .s{font-size:11.5px;color:var(--green);font-weight:700}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.badge.ok{background:var(--green-soft);color:var(--green)}
.badge.flag{background:var(--amber-soft);color:var(--amber)}
.badge svg{width:12px;height:12px}
.row-flagged{background:var(--amber-soft);border-radius:12px;margin:0 -8px;padding:0 8px}
.anom-card{border:1.5px solid var(--amber);background:var(--amber-soft);border-radius:18px;padding:18px}
.anom-card .at{display:flex;align-items:center;gap:10px;flex-direction:row-reverse;text-align:right;font-size:16px;font-weight:800;color:var(--amber)}
.anom-card .at svg{width:22px;height:22px;flex:0 0 auto}
.anom-card p{font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-top:9px;text-align:right}
.pride-hero{background:linear-gradient(150deg,var(--teal) 0%,var(--teal-deep) 100%);border-radius:22px;padding:26px 22px;color:#fff;position:relative;overflow:hidden}
.pride-hero::after{content:"";position:absolute;left:-30px;bottom:-40px;width:140px;height:140px;border-radius:50%;background:rgba(229,110,19,.30)}
.pride-hero .k{font-size:13px;opacity:.85;font-weight:600;position:relative;z-index:2}
.pride-hero .v{font-size:48px;font-weight:800;margin-top:4px;direction:ltr;position:relative;z-index:2}
.pride-hero .c{font-size:14px;opacity:.9;margin-top:4px;position:relative;z-index:2;line-height:1.5}

@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes scan{0%,100%{top:8%}50%{top:88%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>
<div id="scaler"><div id="app"></div></div>
<script>
/* ─── device scaler ──────────────────────────────────────────── */
(function(){
  var s=document.getElementById('scaler');
  function scale(){
    var W=window.innerWidth,H=window.innerHeight;
    if(W<=430){s.style.transform='';s.style.left='';s.style.top='';return;}
    var PW=390,PH=844,sc=Math.min((W-40)/PW,(H-40)/PH);
    s.style.transform='scale('+sc+')';
    s.style.transformOrigin='top left';
    s.style.left=Math.round((W-PW*sc)/2)+'px';
    s.style.top=Math.round((H-PH*sc)/2)+'px';
  }
  scale();
  window.addEventListener('resize',scale);
})();

/* ─── icons ──────────────────────────────────────────────────── */
const I={
  chevR:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1.3" fill="#fff" stroke="none"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="11" width="15" height="9.5" rx="2.2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/></svg>',
  coins:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="9" cy="7" rx="6" ry="3"/><path d="M3 7v5c0 1.66 2.69 3 6 3"/><path d="M3 12v5c0 1.66 2.69 3 6 3"/><circle cx="16" cy="15" r="5"/></svg>',
  store:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5L5.2 5h13.6L20 9.5"/><path d="M4 9.5a2.4 2.4 0 0 0 4 0 2.4 2.4 0 0 0 4 0 2.4 2.4 0 0 0 4 0 2.4 2.4 0 0 0 4 0"/><path d="M5 11v8h14v-8"/><path d="M9 19v-4h4v4"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2.4"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  checkc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="16 9.5 11 15 8 12"/></svg>',

  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="16 8 12 4 8 8"/><line x1="12" y1="4" x2="12" y2="15"/></svg>',

function qrSVG(){
  const n=21,rng=(s=>()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff})(987654321);
  let r='<svg viewBox="0 0 21 21" shape-rendering="crispEdges">';
  const f=(x,y)=>{r+=`<rect x="${x}" y="${y}" width="7" height="7" fill="#0c1413"/><rect x="${x+1}" y="${y+1}" width="5" height="5" fill="#fff"/><rect x="${x+2}" y="${y+2}" width="3" height="3" fill="#0c1413"/>`;};
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    if((x<8&&y<8)||(x>n-9&&y<8)||(x<8&&y>n-9))continue;
    if(rng()>0.55)r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#0c1413"/>`;
  }
  f(0,0);f(n-7,0);f(0,n-7);
  return r+'</svg>';
}

const TIMER_SEC=600;
let timerStart=null,timerTick=null;
function startTimer(){
  if(timerStart)return;
  timerStart=Date.now();
  timerTick=setInterval(()=>{
    const el=document.getElementById('timerPill');if(!el)return;
    const rem=Math.max(0,TIMER_SEC-Math.floor((Date.now()-timerStart)/1000));
    const m=Math.floor(rem/60),s=rem%60;
    el.textContent=m+':'+(s<10?'0':'')+s;
    if(rem<60)el.classList.add('urgent');
    if(rem===0)clearInterval(timerTick);
  },1000);
}
function stopTimer(){if(timerTick)clearInterval(timerTick);timerTick=null;timerStart=null;}
function timerHtml(){
  const rem=timerStart?Math.max(0,TIMER_SEC-Math.floor((Date.now()-timerStart)/1000)):TIMER_SEC;
  const m=Math.floor(rem/60),s=rem%60;
  return `<span id="timerPill"${rem<60?' class="urgent"':''}>${m}:${(s<10?'0':'')+s}</span>`;
}

    cta.disabled=!valid;
    minEl.textContent=(a>0&&BIZ.min&&!valid)?'עוד '+(BIZ.min-a)+' ₪ למינימום ('+BIZ.min+' ₪)':'';
    if(valid){
      heroSave.textContent=f2(s);payEl.textContent=f2(pay);
      heroEl.classList.add('show');
      if(anim){heroEl.classList.remove('pop');void heroEl.offsetWidth;heroEl.classList.add('pop');}
    } else {heroEl.classList.remove('show','pop');payEl.textContent='0.00';}
  }
  document.getElementById('keypad').querySelectorAll('[data-d]').forEach(k=>k.onclick=()=>{
    let v=parseInt(String(state.amount===0?'':state.amount)+k.dataset.d,10)||0;
    if(v>99999)return;state.amount=v;update(true);
  });
  document.getElementById('keypad').querySelector('[data-del]').onclick=()=>{
    const v=String(state.amount);state.amount=v.length<=1?0:parseInt(v.slice(0,-1),10)||0;update(true);
  };
  update(false);
}

/* demo: transmit overlay 1.5s then advance — no fetch, no IndexedDB */
function bindScan(){
  const btn=document.getElementById('scanBtn'),tx=document.getElementById('transmit');
  if(!btn)return;
  btn.onclick=()=>{
    tx.classList.add('show');btn.disabled=true;
    setTimeout(()=>{tx.classList.remove('show');go(1);},1500);
  };
}

/* keyboard nav for laptop presentation */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});

render();
</script>
